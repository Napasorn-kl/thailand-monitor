name: Facebook Scraper — Auto Update

on:
  schedule:
    # รันทุก 6 ชั่วโมง (00:00, 06:00, 12:00, 18:00 UTC = 07:00, 13:00, 19:00, 01:00 ICT)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # รันด้วยตนเองได้จาก GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run Facebook scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          FB_COOKIES:  ${{ secrets.FB_COOKIES }}
        run: |
          python3 scripts/fb_scraper.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/fb_news.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/fb_news.json
          git commit -m "chore: update Facebook posts data [$(date +'%Y-%m-%d %H:%M')]"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "ℹ️  ไม่มีข้อมูลใหม่ — ไม่ต้อง commit"
