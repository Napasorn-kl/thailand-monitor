name: Commodity Scraper — Auto Update

on:
  schedule:
    # รันทุก 8 ชั่วโมง (01:00, 09:00, 17:00 UTC = 08:00, 16:00, 00:00 ICT)
    - cron: '0 1,9,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Commodity scraper
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          OPENWEATHER_KEY:   ${{ secrets.OPENWEATHER_KEY }}
        run: python3 scripts/commodity_scraper.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/commodity_prices.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/commodity_prices.json
          git commit -m "chore: update commodity prices [$(date +'%Y-%m-%d %H:%M')]"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "ℹ️  ราคาไม่เปลี่ยน — ไม่ต้อง commit"
